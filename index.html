<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIACLM - Memoria de Proyecto 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0A1628;
    font-family: 'Inter', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Slideshow */
  .slideshow {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .slide {
    position: absolute;
    max-width: 100vw; max-height: 100vh;
    width: auto; height: auto;
    object-fit: contain;
    opacity: 0;
    transition: opacity .35s ease;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Preload hidden */
  .slide.preload {
    opacity: 0;
  }

  /* Counter */
  .counter {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    font-size: 16px; font-weight: 600;
    color: rgba(255,255,255,.4);
    z-index: 999;
    pointer-events: none;
    letter-spacing: 1px;
  }

  /* Navigation buttons */
  .nav-btn {
    position: fixed; z-index: 9999;
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0,79,255,.8); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.35);
    transition: background .2s, transform .15s, opacity .3s;
    opacity: .7;
  }
  .nav-btn:hover { background: #004FFF; transform: scale(1.12); opacity: 1; }
  .nav-btn:active { transform: scale(.95); }
  .nav-btn svg {
    width: 26px; height: 26px;
    fill: none; stroke: #fff; stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .nav-prev { bottom: 18px; left: 24px; }
  .nav-next { bottom: 18px; right: 24px; }

  /* Invisible click zones */
  .click-left, .click-right {
    position: fixed; top: 0; height: 100%; z-index: 100; cursor: pointer;
  }
  .click-left  { left: 0; width: 20%; }
  .click-right { right: 0; width: 20%; }

  /* Progress bar */
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: #004FFF;
    z-index: 9999;
    transition: width .35s ease;
  }

  /* Fullscreen button */
  .fs-btn {
    position: fixed; top: 18px; right: 18px; z-index: 9999;
    width: 40px; height: 40px; border-radius: 8px;
    background: rgba(255,255,255,.08); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .fs-btn:hover { background: rgba(255,255,255,.18); }
  .fs-btn svg {
    width: 20px; height: 20px;
    fill: none; stroke: rgba(255,255,255,.5); stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* Thumbnail strip */
  .thumb-strip {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    display: none; gap: 8px; z-index: 9999;
    background: rgba(10,22,40,.92);
    border-radius: 12px; padding: 10px 14px;
    max-width: 90vw; overflow-x: auto;
    backdrop-filter: blur(12px);
  }
  .thumb-strip.visible { display: flex; }
  .thumb-strip img {
    height: 54px; width: auto; border-radius: 4px;
    opacity: .5; cursor: pointer;
    transition: opacity .2s, outline .2s;
    outline: 2px solid transparent;
  }
  .thumb-strip img:hover { opacity: .8; }
  .thumb-strip img.active { opacity: 1; outline: 2px solid #004FFF; }
</style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

<div class="slideshow" id="slideshow"></div>

<div class="counter" id="counter">1 / 37</div>

<div class="click-left" id="clickLeft"></div>
<div class="click-right" id="clickRight"></div>

<button class="nav-btn nav-prev" id="btnPrev" aria-label="Anterior">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<button class="nav-btn nav-next" id="btnNext" aria-label="Siguiente">
  <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
</button>

<button class="fs-btn" id="btnFs" aria-label="Pantalla completa">
  <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
</button>

<div class="thumb-strip" id="thumbStrip"></div>

<script>
(function() {
  const slideIds = [
    "FHji5","geBrb","Tuea8","7WIpo","qR1jc","nNAoI","tZzEA",
    "hKiN4","PzLwh","PKQNP","MXAIv","zi18y","edmiC","5Bp1Z",
    "fGoHg","nG7Gk","RvnuB","JloYZ","SBr8b","KaBUx","Ri0B7",
    "Yus9U","bxR46","fQM42","Gt2H9","FpgDT","PMEpm","1BfCn",
    "pIGEV","Dlh3Y","oaU8M","wr13d","o3Vor","gGyjG","2Sukj",
    "RLnhZ","kPYif"
  ];

  const total = slideIds.length;
  const container = document.getElementById('slideshow');
  const counter = document.getElementById('counter');
  const progress = document.getElementById('progress');
  const thumbStrip = document.getElementById('thumbStrip');
  let current = 0;
  let thumbsVisible = false;

  // Create slide images
  const slides = slideIds.map((id, i) => {
    const img = document.createElement('img');
    img.src = 'img/' + id + '.png';
    img.className = 'slide' + (i === 0 ? ' active' : '');
    img.alt = 'Diapositiva ' + (i + 1);
    img.draggable = false;
    container.appendChild(img);
    return img;
  });

  // Create thumbnails
  slideIds.forEach((id, i) => {
    const thumb = document.createElement('img');
    thumb.src = 'img/' + id + '.png';
    thumb.className = i === 0 ? 'active' : '';
    thumb.alt = (i + 1).toString();
    thumb.addEventListener('click', () => showSlide(i));
    thumbStrip.appendChild(thumb);
  });

  function showSlide(n) {
    slides[current].classList.remove('active');
    thumbStrip.children[current].classList.remove('active');
    current = ((n % total) + total) % total;
    slides[current].classList.add('active');
    thumbStrip.children[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + total;
    progress.style.width = ((current + 1) / total * 100) + '%';
    // Scroll thumbnail into view
    thumbStrip.children[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  function next() { showSlide(current + 1); }
  function prev() { showSlide(current - 1); }

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
    if (e.key === 'Home') { e.preventDefault(); showSlide(0); }
    if (e.key === 'End') { e.preventDefault(); showSlide(total - 1); }
    if (e.key === 't' || e.key === 'T') { toggleThumbs(); }
    if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
    if (e.key === 'Escape' && thumbsVisible) { toggleThumbs(); }
  });

  // Buttons
  document.getElementById('btnNext').addEventListener('click', next);
  document.getElementById('btnPrev').addEventListener('click', prev);
  document.getElementById('clickRight').addEventListener('click', next);
  document.getElementById('clickLeft').addEventListener('click', prev);

  // Touch swipe
  let touchStartX = 0;
  document.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; });
  document.addEventListener('touchend', function(e) {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
  });

  // Fullscreen
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
  document.getElementById('btnFs').addEventListener('click', toggleFullscreen);

  // Thumbnails toggle
  function toggleThumbs() {
    thumbsVisible = !thumbsVisible;
    thumbStrip.classList.toggle('visible', thumbsVisible);
  }
  counter.style.cursor = 'pointer';
  counter.addEventListener('click', toggleThumbs);

  // Init
  showSlide(0);
})();
</script>

</body>
</html>
